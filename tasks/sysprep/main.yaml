- name: System prep for Kubernetes
  include_tasks: sysprep.yaml

- name: Setup Nvidia node
  include_tasks: nvidia.yaml
  when: enable_nvidia_node == true

- name: Setup runc
  include_tasks: runc.yaml

- name: Setup containerd
